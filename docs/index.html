<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>English Through My Routine</title>
  <meta name="description" content="Aprenda inglês através da sua própria rotina — com áudio, exercícios e revisão.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#B87317">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="My Routine">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Top bar -->
  <div class="bar no-print">
    <button class="iconbtn" id="menuBtn" aria-label="Abrir índice">☰</button>
    <div class="brand"><span class="dot"></span>English Through My Routine</div>
    <div class="ctrl">
      <div class="seg" role="group" aria-label="Velocidade do áudio">
        <button data-rate="0.7">0.7×</button>
        <button data-rate="0.85">0.85×</button>
        <button data-rate="1">1×</button>
      </div>
      <button class="iconbtn" id="themeBtn" aria-label="Alternar tema">◐</button>
    </div>
  </div>

  <!-- Index drawer -->
  <div class="scrim no-print" id="scrim"></div>
  <nav class="drawer no-print" id="drawer" aria-label="Índice de lições">
    <header>
      <div style="display:flex;align-items:center;gap:.5rem">
        <div style="flex:1"><div class="t">Índice</div><div class="s">Volume 1 — Present</div></div>
        <button class="iconbtn" id="drawerClose" aria-label="Fechar índice">✕</button>
      </div>
    </header>
    <div class="list" id="toclist"></div>
  </nav>

  <!-- Lesson view -->
  <main id="view"></main>

  <!-- Install hint -->
  <div class="install no-print" id="install">
    <span>📲 Instalar como app</span>
    <button class="btn" id="installBtn">Instalar</button>
    <button class="iconbtn" id="installX" aria-label="Dispensar" style="width:1.8rem;height:1.8rem">✕</button>
  </div>

  <!-- Conteúdo (dados das lições) -->
  <script src="licoes/_indice.js"></script>
  <script src="licoes/licao-01.js"></script>
  <script src="licoes/licao-02.js"></script>
  <!-- Motor -->
  <script src="app.js"></script>
</body>
</html>
